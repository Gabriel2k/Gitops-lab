apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  name: kube-prometheus-stack
  namespace: argo-cd
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts # Official Gitea Helm Chart
      chart: kube-prometheus-stack
      targetRevision: 85.0.3
      helm:
        valueFiles:
          - $values/infrastructure/monitoring/values.yaml # Relative path from repo root
    - repoURL: https://github.com/Gabriel2k/Gitops-lab.git
      targetRevision: main
      ref: values # Reference for $values
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
