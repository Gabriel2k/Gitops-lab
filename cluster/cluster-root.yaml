apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-root
  namespace: argo-cd # FIXED
spec:
  project: default

  source:
    repoURL: https://github.com/Gabriel2k/Gitops-lab.git
    targetRevision: main
    path: infrastructure

  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
