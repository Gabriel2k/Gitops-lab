# ---------------------------------------------------------------------------
# NEXTCLOUD VALUES (CLEAN + WORKING K8S SETUP)
# ---------------------------------------------------------------------------

image:
  repository: nextcloud
  #tag: "29.0.7-apache"
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# NEXTCLOUD CORE CONFIG
# ---------------------------------------------------------------------------
nextcloud:
  host: nextcloud.k8s.warpcore.dk

  existingSecret:
    enabled: true
    secretName: nextcloud-credentials
    usernameKey: nextcloud-username
    passwordKey: nextcloud-password
    smtpUsernameKey: smtp-username
    smtpPasswordKey: smtp-password

  extraEnv:
    - name: OVERWRITEPROTOCOL
      value: "https"
    - name: TRUSTED_PROXIES
      value: "10.0.0.0/8"

    # 🔥 FORCE MariaDB usage (fixer SQLite fallback)
    - name: MYSQL_HOST
      value: nextcloud-mariadb
    - name: MYSQL_DATABASE
      value: nextcloud
    - name: MYSQL_USER
      value: nextcloud
    - name: MYSQL_PASSWORD
      valueFrom:
        secretKeyRef:
          name: mariadb-credentials
          key: mariadb-password

  configs:
    custom.config.php: |-
      <?php
      $CONFIG = array (
        'trusted_domains' => array (
          0 => 'nextcloud.k8s.warpcore.dk',
        ),
        'overwrite.cli.url' => 'https://nextcloud.k8s.warpcore.dk',
        'loglevel' => 2,
        'filelocking.enabled' => true,
        'default_phone_region' => 'DK',
      );

  cronjob:
    enabled: true
    schedule: "*/5 * * * *"

  phpClientHttpsFix:
    enabled: true
    protocol: https

# ---------------------------------------------------------------------------
# SECURITY
# ---------------------------------------------------------------------------
securityContext:
  runAsUser: 33
  runAsGroup: 33
  runAsNonRoot: true

# ---------------------------------------------------------------------------
# STORAGE
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: "longhorn"
  accessMode: ReadWriteOnce
  size: 10Gi

# ---------------------------------------------------------------------------
# INGRESS (Traefik via IngressRoute, så disabled her)
# ---------------------------------------------------------------------------
ingress:
  enabled: false

# ---------------------------------------------------------------------------
# RESOURCES
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# ---------------------------------------------------------------------------
# MARIADB (SUBCHART)
# ---------------------------------------------------------------------------
mariadb:
  enabled: true

  architecture: standalone

  auth:
    database: nextcloud
    username: nextcloud
    existingSecret: mariadb-credentials

  primary:
    persistence:
      enabled: true
      storageClass: "longhorn"
      size: 10Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ---------------------------------------------------------------------------
# REDIS (file locking + caching)
# ---------------------------------------------------------------------------
redis:
  enabled: true

  auth:
    enabled: true
    existingSecret: redis-credentials
    existingSecretPasswordKey: redis-password

  master:
    persistence:
      enabled: false

# ---------------------------------------------------------------------------
# REPLICA (Nextcloud skal være 1 pod med RWO storage)
# ---------------------------------------------------------------------------
replicaCount: 1

deploymentStrategy:
  type: Recreate

# ---------------------------------------------------------------------------
# PROBES
# ---------------------------------------------------------------------------
livenessProbe:
  enabled: true
  initialDelaySeconds: 60
  timeoutSeconds: 10

readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  timeoutSeconds: 10

# ---------------------------------------------------------------------------
# METRICS
# ---------------------------------------------------------------------------
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
