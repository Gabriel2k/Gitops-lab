# ---------------------------------------------------------------------------
# NEXTCLOUD - VALUES.YAML
# ArgoCD peger direkte på Nextcloud Helm chart repository.
# Ingen wrapper-chart, ingen nesting — alle værdier går direkte ind i chartet.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# NEXTCLOUD
# ---------------------------------------------------------------------------
nextcloud:
  host: nextcloud.k8s.warpcore.dk
  existingSecret:
    enabled: true
    secretName: nextcloud-credentials
    usernameKey: nextcloud-username
    passwordKey: nextcloud-password
    smtpUsernameKey: smtp-username
    smtpPasswordKey: smtp-password
  phpClientHttpsFix:
    enabled: true
    protocol: https
  extraEnv:
    - name: OVERWRITEPROTOCOL
      value: "https"
    - name: TRUSTED_PROXIES
      value: "10.0.0.0/8"
  securityContext:
    runAsUser: 33
    runAsGroup: 33
    runAsNonRoot: true
  cronjob:
    enabled: true
    type: sidecar

# ---------------------------------------------------------------------------
# INGRESS (Traefik via IngressRoute, så disabled her)
# ---------------------------------------------------------------------------
ingress:
  enabled: false

# ---------------------------------------------------------------------------
# DATABASE
# ---------------------------------------------------------------------------
internalDatabase:
  enabled: false
externalDatabase:
  enabled: true
  type: mysql
  host: nextcloud-mariadb
  database: nextcloud
  existingSecret:
    enabled: true
    secretName: mariadb-credentials
    usernameKey: mariadb-user
    passwordKey: mariadb-password

# ---------------------------------------------------------------------------
# MARIADB (Nextcloud-chartets eget bundlede subchart)
# ---------------------------------------------------------------------------
mariadb:
  enabled: true
  architecture: standalone
  auth:
    database: nextcloud
    username: nextcloud
    existingSecret: mariadb-credentials
  primary:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 10Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ---------------------------------------------------------------------------
# REDIS (Nextcloud-chartets eget bundlede subchart)
# ---------------------------------------------------------------------------
redis:
  enabled: true
  auth:
    enabled: true
    existingSecret: redis-credentials
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 2Gi

# ---------------------------------------------------------------------------
# STORAGE
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteOnce
  size: 10Gi

# ---------------------------------------------------------------------------
# DEPLOYMENT
# ---------------------------------------------------------------------------
replicaCount: 1
deploymentStrategy:
  type: Recreate

# ---------------------------------------------------------------------------
# RESOURCES
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: "1"
    memory: 2Gi

# ---------------------------------------------------------------------------
# PROBES
# ---------------------------------------------------------------------------
livenessProbe:
  enabled: true
  initialDelaySeconds: 60
  timeoutSeconds: 10
readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  timeoutSeconds: 10
startupProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# ---------------------------------------------------------------------------
# METRICS
# ---------------------------------------------------------------------------
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
