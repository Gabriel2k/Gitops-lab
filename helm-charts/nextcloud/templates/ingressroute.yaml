apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nextcloud
  namespace: nextcloud

spec:
  entryPoints:
    - websecure

  routes:
    - match: Host(`nextcloud.k8s.warpcore.dk`)
      kind: Rule
      services:
        - name: nextcloud
          port: 8080

  tls:
    secretName: wildcard-k8s-warpcore-tls
