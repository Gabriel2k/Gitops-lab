apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-root
  namespace: argo-cd
spec:
  project: default

  sources:
    - repoURL: https://github.com/Gabriel2k/Gitops-lab.git
      targetRevision: main
      path: infrastructure
      directory:
        recurse: true
    - repoURL: https://github.com/Gabriel2k/Gitops-lab.git
      targetRevision: main
      path: apps
      directory:
        recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
