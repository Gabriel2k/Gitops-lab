apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud-prereqs
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/Gabriel2k/Gitops-lab
    targetRevision: new-deployment
    path: helm-charts/nextcloud/templates
  destination:
    server: https://kubernetes.default.svc
    namespace: nextcloud
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
